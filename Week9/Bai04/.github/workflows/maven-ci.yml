name: Maven CI Matrix

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run unit tests
        run: mvn --batch-mode test

      - name: Build package
        run: mvn --batch-mode package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-jar-${{ matrix.os }}
          path: target/*.jar
